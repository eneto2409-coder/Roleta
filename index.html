
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Agro Sustentável</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(to bottom, #1b5e20, #4caf50, #ff9800); background-attachment: fixed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; color: white; }
        
        /* Design da Roleta */
        .wheel-container { position: relative; padding: 20px; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; }
        .arrow { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #ffeb3b; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 10; }
        #wheel { width: 320px; height: 320px; border-radius: 50%; border: 12px solid #b71c1c; background: conic-gradient(#ff0000 0deg 30deg, #ffff00 30deg 60deg, #0000ff 60deg 90deg, #008000 90deg 120deg, #800080 120deg 150deg, #ffa500 150deg 180deg, #00ffff 180deg 210deg, #ff00ff 210deg 240deg, #adff2f 240deg 270deg, #ffc0cb 270deg 300deg, #008080 300deg 330deg, #ffffff 330deg 360deg); transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .center-circle { width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid #333; display: flex; align-items: center; justify-content: center; color: #b71c1c; font-weight: bold; }
        
        /* Ajustes de Fonte e Cards */
        .card { background: rgba(255,255,255,0.95); padding: 25px; border-radius: 20px; color: #333; width: 90%; max-width: 450px; text-align: center; margin-top: 20px; }
        .age-btn { font-size: 1.2rem; padding: 15px; margin: 8px 0; border-radius: 12px; }
        h1 { font-size: 2rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .spin { transform: rotate(2880deg); }
        button { background: #b71c1c; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #8e1414; }
    </style>
</head>
<body>

<div class="wheel-container">
    <div class="arrow"></div>
    <div id="wheel" onclick="girarRoleta()">
        <div class="center-circle">GIRAR</div>
    </div>
</div>

<div class="card" id="tela">
    <h1>Quiz Agro</h1>
    <p>Clique na roleta para testar seus conhecimentos!</p>
</div>

<audio id="somGiro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
const baseDeDados = {
    "menos_12": {
        "multipla": [{ "pergunta": "O que é agricultura de precisão?", "opcoes": ["Usar tecnologia", "Usar enxada", "Não fazer nada"], "correta": "Usar tecnologia" }],
        "discursiva": [{ "pergunta": "Como o adubo orgânico ajuda a terra?", "dica": "Lembra que ele vira comida para a planta." }]
    },
    "entre_13_17": {
        "multipla": [{ "pergunta": "Qual ferramenta usa GPS na lavoura?", "opcoes": ["Agricultura de Precisão", "Arado", "Regador"], "correta": "Agricultura de Precisão" }],
        "discursiva": [{ "pergunta": "Por que o gotejamento economiza água?", "dica": "Ele entrega a água direto na raiz." }]
    },
    "mais_18": {
        "multipla": [{ "pergunta": "O que é Taxa Variável na AP?", "opcoes": ["Aplicar conforme o solo", "Aplicar tudo igual", "Não aplicar"], "correta": "Aplicar conforme o solo" }],
        "discursiva": [{ "pergunta": "Explique a relação C/N na compostagem.", "dica": "Equilíbrio entre carbono e nitrogênio." }]
    }
};

function girarRoleta() {
    const wheel = document.getElementById('wheel');
    document.getElementById('somGiro').play();
    wheel.classList.add('spin');
    setTimeout(() => {
        wheel.classList.remove('spin');
        document.getElementById('tela').innerHTML = `
            <h2>Escolha sua idade:</h2>
            <button class="age-btn" onclick="sortear('menos_12')">🌱 Até 12 anos</button>
            <button class="age-btn" onclick="sortear('entre_13_17')">🚀 13 a 17 anos</button>
            <button class="age-btn" onclick="sortear('mais_18')">🚜 18+ anos</button>
        `;
    }, 4000);
}

function sortear(idade) {
    const dados = baseDeDados[idade];
    const todas = [...dados.multipla, ...dados.discursiva];
    const p = todas[Math.floor(Math.random() * todas.length)];
    let html = `<h3>${p.pergunta}</h3>`;
    
    if (p.opcoes) {
        p.opcoes.forEach(op => html += `<button onclick="alert('${op === p.correta ? '✅ Acertou!' : '❌ Errou! Tente de novo.'}')">${op}</button>`);
    } else {
        html += `<details style="margin:10px; color:#555;"><summary>Ver Dica</summary><p>${p.dica}</p></details>
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="586f5c34-2ae3-4e9b-bbc4-23fa22bdfc22">
                <input type="text" name="nome" placeholder="Seu nome" required>
                <textarea name="resposta" placeholder="Sua resposta"></textarea>
                <button type="submit">Enviar Resposta</button>
            </form>`;
    }
    html += `<button style="background:#444; margin-top:15px;" onclick="location.reload()">Girar Novamente</button>`;
    document.getElementById('tela').innerHTML = html;
}
</script>
</body>
</html>
