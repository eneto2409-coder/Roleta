<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoQuiz - Roleta</title>
    <style>
        body { margin: 0; min-height: 100vh; background: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfacb?q=80&w=2560') no-repeat center center fixed; background-size: cover; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #roleta { width: 300px; height: 300px; border-radius: 50%; border: 15px solid #5d4037; background: conic-gradient(red 0deg 120deg, green 120deg 240deg, orange 240deg 360deg); margin: 0 auto 25px; transition: 4s ease-out; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .girar { transform: rotate(1440deg); }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; background: #795548; }
        .nivel-tag { font-size: 0.9em; color: #555; font-weight: bold; margin-top: 10px; padding: 5px; background: #eee; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="box">
    <div id="roleta" onclick="rodar()">GIRAR ROLETA</div>
    <div id="tela">
        <p>Clique na roleta para começar!</p>
    </div>
</div>

<script>
// Estrutura: 8 perguntas por categoria
const banco = {
    "até 12 anos": [
        { p: "O que as plantas precisam para crescer?", n: "Médio", d: "" },
        { p: "Por que devemos economizar água?", n: "Médio", d: "" },
        { p: "Como funciona a polinização?", n: "Difícil", d: "Dica: É feita por insetos como abelhas." }
        // ... adicione até 8 aqui
    ],
    "13 a 17 anos": [
        { p: "Qual o impacto dos agrotóxicos no solo?", n: "Médio", d: "" },
        { p: "Como a rotação de culturas ajuda o solo?", n: "Difícil", d: "Dica: Pense em nutrientes específicos." }
    ],
    "18 anos ou mais": [
        { p: "Explique o conceito de Pegada de Carbono.", n: "Médio", d: "" },
        { p: "Como a agricultura regenerativa altera o ciclo do carbono?", n: "Difícil", d: "Dica: Foco no sequestro de carbono pelo solo." }
    ]
};

function rodar() {
    document.getElementById('roleta').classList.add('girar');
    setTimeout(() => {
        document.getElementById('tela').innerHTML = `
            <h3>Selecione sua faixa etária:</h3>
            ${Object.keys(banco).map(f => `<button class="btn" onclick="escolherPergunta('${f}')">${f}</button>`).join('')}
        `;
    }, 2000);
}

function escolherPergunta(faixa) {
    const lista = banco[faixa];
    const q = lista[Math.floor(Math.random() * lista.length)];
    document.getElementById('tela').innerHTML = `
        <p>${q.p}</p>
        <div class="nivel-tag">Nível: ${q.n}</div>
        ${q.d ? `<p style="font-style:italic; font-size:0.8em;">${q.d}</p>` : ''}
        <textarea style="width:100%; margin:10px 0;"></textarea>
        <button class="btn" onclick="location.reload()">Girar Novamente</button>
    `;
}
</script>
</body>
</html>
