<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoQuiz - Agro Sustentável</title>
    <style>
        body { margin: 0; min-height: 100vh; background: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfacb?q=80&w=2560') no-repeat center center fixed; background-size: cover; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #roleta { width: 300px; height: 300px; border-radius: 50%; border: 10px solid #ffd700; background: conic-gradient(#ff0000 0deg 72deg, #ffd700 72deg 144deg, #4caf50 144deg 216deg, #2196f3 216deg 288deg, #9c27b0 288deg 360deg); margin: 0 auto 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .girar { animation: girarAnimacao 4s cubic-bezier(0.17, 0.67, 0.12, 0.99) forwards; }
        @keyframes girarAnimacao { from { transform: rotate(0deg); } to { transform: rotate(2880deg); } }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; background: #795548; }
        .btn:hover { opacity: 0.9; }
        textarea { width: 100%; height: 80px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <div id="roleta" onclick="rodar()"></div>
    <div id="tela"><h3>Bem-vindo ao EcoQuiz!</h3><p>Clique na roleta para começar.</p></div>
</div>

<script>
const banco = {
    "👶 Infantil": [
        { p: "O que significa cultivar de forma orgânica?", tipo: "escolha", opc: ["Usar venenos", "Sem agrotóxicos", "Plantar no escuro"], corr: "Sem agrotóxicos" },
        { p: "Por que as abelhas são importantes?", tipo: "escolha", opc: ["Fazem mel", "Ajudam a polinizar", "Comem plantas"], corr: "Ajudam a polinizar" },
        { p: "O que é compostagem?", tipo: "escolha", opc: ["Queimar lixo", "Transformar restos em adubo", "Lavar comida"], corr: "Transformar restos em adubo" },
        { p: "Qual o recurso principal para as plantas?", tipo: "escolha", opc: ["Plástico", "Água limpa e solo", "Telefone"], corr: "Água limpa e solo" },
        { p: "Como as plantas bebem água?", tipo: "discursiva", d: "Dica: Elas usam suas raízes." }
    ],
    "👦 Juvenil": [
        { p: "O que é rotação de culturas?", tipo: "escolha", opc: ["Alternar plantas", "Girar trator", "Vender para fora"], corr: "Alternar plantas" },
        { p: "Qual o impacto de químicos no solo?", tipo: "escolha", opc: ["Aumenta fruto", "Contamina lençol freático", "Custo baixo"], corr: "Contamina lençol freático" },
        { p: "O que é Agrofloresta?", tipo: "escolha", opc: ["Imitar a floresta", "Loja de plantas", "Desmatar"], corr: "Imitar a floresta" },
        { p: "O que é um alimento transgênico?", tipo: "escolha", opc: ["DNA modificado", "Cresce rápido", "Vem de fora"], corr: "DNA modificado" },
        { p: "Explique a erosão hídrica.", tipo: "discursiva", d: "Dica: É causada pelo escoamento da água." }
    ],
    "+18 Anos": [
        { p: "Qual o conceito de Segurança Alimentar?", tipo: "escolha", opc: ["Acesso a comida nutritiva", "Comida cara", "Produção industrial"], corr: "Acesso a comida nutritiva" },
        { p: "O que é sequestro de carbono no solo?", tipo: "escolha", opc: ["Armazenar CO2 no solo", "Queimar biomassa", "Poluir o ar"], corr: "Armazenar CO2 no solo" },
        { p: "Defina Agricultura de Precisão.", tipo: "escolha", opc: ["Uso de dados e tecnologia", "Corte manual", "Uso de enxada"], corr: "Uso de dados e tecnologia" },
        { p: "O que são créditos de carbono?", tipo: "discursiva", d: "Dica: Fale sobre compensação de emissões." },
        { p: "Explique o impacto do uso de pesticidas na biodiversidade local.", tipo: "discursiva", d: "Dica: Fale sobre o equilíbrio ecológico." }
    ]
};

function rodar() {
    const roleta = document.getElementById('roleta');
    roleta.classList.remove('girar');
    void roleta.offsetWidth; 
    roleta.classList.add('girar');
    setTimeout(() => {
        let html = `<h3>Escolha sua faixa etária:</h3>` + Object.keys(banco).map(f => `<button class="btn" onclick="escolher('${f}')">${f}</button>`).join('');
        document.getElementById('tela').innerHTML = html;
    }, 4000);
}

function escolher(faixa) {
    const q = banco[faixa][Math.floor(Math.random() * banco[faixa].length)];
    let html = `<p>${q.p}</p>`;
    if (q.tipo === "escolha") {
        html += q.opc.map(o => `<button class="btn" onclick="alert('${o === q.corr ? '✅ Correto!' : '❌ Errado!'}')">${o}</button>`).join('');
    } else {
        html += `<textarea placeholder="${q.d}"></textarea><button class="btn" onclick="alert('Resposta enviada!')">Enviar Resposta</button>`;
    }
    html += `<button class="btn" style="background:#b71c1c" onclick="location.reload()">Girar Novamente</button>`;
    document.getElementById('tela').innerHTML = html;
}
</script>
</body>
</html>
