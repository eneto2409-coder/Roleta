<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoQuiz - Agro Sustentável</title>
    <style>
        body { margin: 0; min-height: 100vh; background: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfacb?q=80&w=2560') no-repeat center center fixed; background-size: cover; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #roleta { width: 300px; height: 300px; border-radius: 50%; border: 10px solid #ffd700; background: conic-gradient(#ff0000 0deg 72deg, #ffd700 72deg 144deg, #4caf50 144deg 216deg, #2196f3 216deg 288deg, #9c27b0 288deg 360deg); margin: 0 auto 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .girar { animation: girarAnimacao 4s cubic-bezier(0.17, 0.67, 0.12, 0.99) forwards; }
        @keyframes girarAnimacao { from { transform: rotate(0deg); } to { transform: rotate(2880deg); } }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; background: #795548; }
        .btn-dica { background: #ff9800; }
        .btn:hover { opacity: 0.9; }
        .nivel { font-size: 0.85em; color: #555; font-style: italic; margin-bottom: 10px; }
        textarea { width: 100%; height: 80px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <div id="roleta" onclick="rodar()"></div>
    <div id="tela"><h3>Bem-vindo ao EcoQuiz!</h3><p>Clique na roleta para começar.</p>
    </div>
</div>

<script>
const banco = {
    "👶 Infantil": [
        { p: "O que significa cultivar de forma orgânica?", n: "Fácil", tipo: "escolha", opc: ["Usar venenos", "Sem agrotóxicos", "Plantar no escuro"], corr: "Sem agrotóxicos", d: "Dica: É o contrário de usar produtos químicos tóxicos." },
        { p: "Por que as abelhas são importantes?", n: "Fácil", tipo: "escolha", opc: ["Fazem mel", "Ajudam a polinizar", "Comem plantas"], corr: "Ajudam a polinizar", d: "Dica: Elas levam o pólen de flor em flor." },
        { p: "O que é compostagem?", n: "Médio", tipo: "escolha", opc: ["Queimar lixo", "Transformar restos em adubo", "Lavar comida"], corr: "Transformar restos em adubo", d: "Dica: É reciclar restos de comida para alimentar a terra." },
        { p: "Como as plantas bebem água?", n: "Médio", tipo: "discursiva", d: "Dica: Elas têm 'canudinhos' invisíveis escondidos debaixo da terra que puxam a água para cima." },
        { p: "Por que as plantas precisam da luz do sol?", n: "Difícil", tipo: "discursiva", d: "Dica: O sol é o ingrediente principal da 'receita' que elas usam para fabricar o próprio alimento." }
    ],
    "👦 13 a 17 anos": [
        { p: "O que é rotação de culturas?", n: "Médio", tipo: "escolha", opc: ["Alternar plantas", "Girar trator", "Vender para fora"], corr: "Alternar plantas", d: "Dica: É revezar o tipo de planta no mesmo solo." },
        { p: "Qual o impacto de químicos no solo?", n: "Médio", tipo: "escolha", opc: ["Aumenta fruto", "Contamina lençol freático", "Custo baixo"], corr: "Contamina lençol freático", d: "Dica: Afeta a água que bebemos embaixo da terra." },
        { p: "O que é Agrofloresta?", n: "Difícil", tipo: "escolha", opc: ["Imitar a floresta", "Loja de plantas", "Desmatar"], corr: "Imitar a floresta", d: "Dica: Integra produção de alimentos com o sistema da floresta." },
        { p: "Como o nitrogênio ajuda a planta?", n: "Médio", tipo: "discursiva", d: "Dica: Pense na cor das folhas e no crescimento da parte aérea da planta." },
        { p: "O que causa a erosão hídrica no solo?", n: "Difícil", tipo: "discursiva", d: "Dica: Ocorre quando a água da chuva atinge um solo que não tem cobertura vegetal para protegê-lo." }
    ],
    "+18 Anos": [
        { p: "Qual o conceito de Segurança Alimentar?", n: "Médio", tipo: "escolha", opc: ["Acesso a comida nutritiva", "Comida cara", "Produção industrial"], corr: "Acesso a comida nutritiva", d: "Dica: É garantir que todos tenham o que comer com qualidade." },
        { p: "Explique a agricultura regenerativa.", n: "Médio", tipo: "discursiva", d: "Dica: Não foca apenas na produtividade, mas em deixar o solo melhor do que quando começamos." },
        { p: "Como a rotação de culturas beneficia o solo?", n: "Difícil", tipo: "discursiva", d: "Dica: Interrupção do ciclo de vida de pragas específicas." },
        { p: "O que é o sequestro de carbono pelo solo?", n: "Difícil", tipo: "discursiva", d: "Dica: Processo onde a planta captura CO2 do ar e o fixa na terra." },
        { p: "Qual a função do húmus na terra?", n: "Difícil", tipo: "discursiva", d: "Dica: Funciona como uma 'esponja' de nutrientes e água." }
    ]
};

function rodar() {
    const roleta = document.getElementById('roleta');
    roleta.classList.remove('girar');
    void roleta.offsetWidth; 
    roleta.classList.add('girar');
    setTimeout(() => {
        let html = `<h3>Escolha sua faixa etária:</h3>` + Object.keys(banco).map(f => `<button class="btn" onclick="escolher('${f}')">${f}</button>`).join('');
        document.getElementById('tela').innerHTML = html;
    }, 4000);
}

function escolher(faixa) {
    const q = banco[faixa][Math.floor(Math.random() * banco[faixa].length)];
    let html = `<p>${q.p}</p><div class="nivel">Nível: ${q.n}</div>`;
    
    if (q.tipo === "escolha") {
        html += q.opc.map(o => `<button class="btn" onclick="alert('${o === q.corr ? '✅ Correto!' : '❌ Errado!'}')">${o}</button>`).join('');
        html += `<button class="btn btn-dica" onclick="alert('${q.d}')">💡 Ver Dica</button>`;
    } else {
        html += `<p style="font-size: 0.9em; color: #d84315;"><em>${q.d}</em></p><textarea></textarea><button class="btn" onclick="alert('Resposta enviada!')">Enviar Resposta</button>`;
    }
    html += `<button class="btn" style="background:#b71c1c" onclick="location.reload()">Girar Novamente</button>`;
    document.getElementById('tela').innerHTML = html;
}
</script>
</body>
</html>
