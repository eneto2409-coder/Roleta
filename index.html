<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Agro Sustentável</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-image: url('https://i.imgur.com/vH1Wn2q.png'); /* Substitua pelo nome do seu arquivo de imagem se subir para o repo */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.4);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Roleta */
        .wheel-container { position: relative; margin-bottom: 30px; }
        #wheel { 
            width: 320px; height: 320px; border-radius: 50%; border: 15px solid #d32f2f; 
            background: conic-gradient(#ff0000 0deg 60deg, #ffeb3b 60deg 120deg, #4caf50 120deg 180deg, #2196f3 180deg 240deg, #9c27b0 240deg 300deg, #ff9800 300deg 360deg);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 40px rgba(0,0,0,0.8); 
        }
        .center-circle { width: 100px; height: 100px; background: white; border-radius: 50%; border: 6px solid #b71c1c; display: flex; align-items: center; justify-content: center; color: #b71c1c; font-weight: 900; text-align: center; font-size: 13px; }
        .spin { transform: rotate(2880deg); }

        /* Estilo EcoQuiz */
        .eco-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-align: center; width: 90%; max-width: 400px; }
        .eco-btn { display: block; width: 100%; background: #795548; color: white; padding: 15px; margin: 10px 0; border-radius: 12px; font-size: 1.1rem; font-weight: bold; border: none; cursor: pointer; }
        .eco-btn:hover { background: #5d4037; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="wheel-container">
            <div id="wheel" onclick="girarRoleta()">
                <div class="center-circle">ROLETA DE PRÊMIOS</div>
            </div>
        </div>

        <div id="tela">
            <div class="eco-card">
                <p style="color: #333;">Clique na roleta para girar!</p>
            </div>
        </div>
    </div>

<audio id="somGiro" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
const baseDeDados = {
    "menos_12": { "pergunta": "O que é agricultura de precisão?", "nivel": "Fácil 🌱", "opcoes": ["Usar tecnologia", "Usar enxada"], "correta": "Usar tecnologia" },
    "entre_13_17": { "pergunta": "Qual ferramenta usa GPS?", "nivel": "Médio 🚀", "opcoes": ["Agricultura de Precisão", "Arado"], "correta": "Agricultura de Precisão" },
    "mais_18": { "pergunta": "Explique a relação C/N na compostagem.", "nivel": "Difícil 🚜", "dica": "Equilíbrio entre carbono e nitrogênio." }
};

function girarRoleta() {
    document.getElementById('somGiro').play();
    document.getElementById('wheel').classList.add('spin');
    setTimeout(() => {
        document.getElementById('tela').innerHTML = `
            <div class="eco-card">
                <h3>EcoQuiz</h3>
                <p>Selecione a sua faixa etária:</p>
                <button class="eco-btn" onclick="sortear('menos_12')">👶 Até 12 anos</button>
                <button class="eco-btn" onclick="sortear('entre_13_17')">👦 13 a 17 anos</button>
                <button class="eco-btn" onclick="sortear('mais_18')">👨 18 anos ou mais</button>
            </div>
        `;
    }, 4000);
}

function sortear(idade) {
    const p = baseDeDados[idade];
    let html = `<div class="eco-card"><h3>${p.pergunta}</h3><p>Nível: <b>${p.nivel}</b></p>`;
    if (p.opcoes) {
        p.opcoes.forEach(op => html += `<button class="eco-btn" onclick="alert('${op === p.correta ? '✅ Acertou!' : '❌ Errou!'}')">${op}</button>`);
    } else {
        html += `<p>Dica: ${p.dica}</p>
                 <form action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="586f5c34-2ae3-4e9b-bbc4-23fa22bdfc22">
                    <input type="text" name="nome" placeholder="Seu nome" required style="width:100%; padding:10px; margin:5px 0;">
                    <button type="submit" class="eco-btn">Enviar Resposta</button>
                 </form>`;
    }
    html += `<button class="eco-btn" style="background:#444" onclick="location.reload()">Girar Novamente</button></div>`;
    document.getElementById('tela').innerHTML = html;
}
</script>
</body>
</html>
