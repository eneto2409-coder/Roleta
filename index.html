<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoQuiz - Agro Sustentável</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfacb?q=80&w=2560') center/cover fixed; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .overlay { background: rgba(0, 0, 0, 0.4); width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #wheel { width: 300px; height: 300px; border-radius: 50%; border: 15px solid #d32f2f; background: conic-gradient(#ff0000 0deg 120deg, #4caf50 120deg 240deg, #ff9800 240deg 360deg); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .center-circle { width: 100px; height: 100px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; text-align: center; font-size: 13px; color: #b71c1c; }
        .spin { transform: rotate(2880deg); }

        .eco-card { background: white; padding: 25px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; margin-top: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        .facil { background: #2e7d32; }
        .dificil { background: #c62828; }
    </style>
</head>
<body>
    <div class="overlay">
        <div id="wheel" onclick="iniciarFluxo()">
            <div class="center-circle">ROLETA DE<br>PERGUNTAS</div>
        </div>
        <div id="tela" class="eco-card">
            <p>Clique na roleta para girar!</p>
        </div>
    </div>

<script>
const base = {
    facil: { p: "O que é agricultura de precisão?", d: "Fácil 🌱", r: "Usar tecnologia no campo" },
    dificil: { p: "Explique a relação C/N na compostagem.", d: "Difícil 🚜", r: "Equilíbrio entre Carbono e Nitrogênio" }
};

function iniciarFluxo() {
    document.getElementById('wheel').classList.add('spin');
    setTimeout(() => {
        document.getElementById('tela').innerHTML = `
            <h3>EcoQuiz</h3>
            <p>Selecione seu nível:</p>
            <button class="btn facil" onclick="sortear('facil')">Fácil 🌱</button>
            <button class="btn dificil" onclick="sortear('dificil')">Difícil 🚜</button>
        `;
    }, 4000);
}

function sortear(nivel) {
    const q = base[nivel];
    document.getElementById('tela').innerHTML = `
        <h3 class="${nivel}">${q.d}</h3>
        <p>${q.p}</p>
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="586f5c34-2ae3-4e9b-bbc4-23fa22bdfc22">
            <input type="text" name="nome" placeholder="Seu nome" required style="width:100%; padding:10px; margin:5px 0;">
            <textarea name="resposta" placeholder="Sua resposta" style="width:100%; padding:10px; margin:5px 0;"></textarea>
            <button type="submit" class="btn ${nivel}">Enviar Resposta</button>
        </form>
        <button class="btn" style="background:#555" onclick="location.reload()">Girar Novamente</button>
    `;
}
</script>
</body>
</html>
