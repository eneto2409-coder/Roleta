<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoQuiz - Agro Sustentável</title>
    <style>
        body { margin: 0; min-height: 100vh; background: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfacb?q=80&w=2560') no-repeat center center fixed; background-size: cover; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
        .box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #roleta { 
            width: 320px; height: 320px; border-radius: 50%; border: 12px solid #ffd700;
            background: conic-gradient(#ff0000 0deg 60deg, #ffd700 60deg 120deg, #4caf50 120deg 180deg, #2196f3 180deg 240deg, #9c27b0 240deg 300deg, #ff9800 300deg 360deg);
            margin: 0 auto 25px; transition: 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); cursor: pointer;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 50px rgba(0,0,0,0.3);
        }
        #roleta::after { content: "GIRAR"; background: white; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #5d4037; border: 4px solid #ffd700; }
        .girar { transform: rotate(2880deg); }
        
        .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; background: #795548; transition: 0.3s; }
        .btn-opc { background: #555; }
        .btn:hover { opacity: 0.9; }
        .nivel-tag { font-size: 0.9em; color: #fff; font-weight: bold; margin: 10px 0; padding: 6px 12px; background: #5d4037; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="box">
    <div id="roleta" onclick="rodar()"></div>
    <div id="tela">
        <p>Bem-vindo ao EcoQuiz! Clique na roleta para começar.</p>
    </div>
</div>

<script>
const banco = {
    "👶 Até 12 anos": [
        { p: "O que significa cultivar alimentos de forma orgânica?", n: "Fácil", tipo: "escolha", opc: ["Usar venenos", "Sem agrotóxicos", "Plantar no escuro"], corr: "Sem agrotóxicos" },
        { p: "Por que as abelhas são importantes?", n: "Médio", tipo: "escolha", opc: ["Fazem mel", "Ajudam a polinizar", "Comem as plantas"], corr: "Ajudam a polinizar" },
        { p: "O que é a compostagem?", n: "Médio", tipo: "escolha", opc: ["Queimar lixo", "Transformar restos em adubo", "Lavar comida"], corr: "Transformar restos em adubo" },
        { p: "Qual o recurso principal para as plantas?", n: "Fácil", tipo: "escolha", opc: ["Plástico", "Água limpa e solo", "Telefone"], corr: "Água limpa e solo" },
        { p: "O que é o reflorestamento?", n: "Médio", tipo: "escolha", opc: ["Cortar árvores", "Plantar onde foram retiradas", "Construir casas"], corr: "Plantar onde foram retiradas" }
    ],
    "👦 13 a 17 anos": [
        { p: "O que é rotação de culturas?", n: "Médio", tipo: "escolha", opc: ["Alternar plantas no solo", "Girar o trator", "Vender para outros países"], corr: "Alternar plantas no solo" },
        { p: "Qual o impacto de fertilizantes químicos?", n: "Difícil", tipo: "escolha", opc: ["Aumenta fruto", "Contamina lençol freático", "Custo baixo"], corr: "Contamina lençol freático" },
        { p: "O que é Agrofloresta?", n: "Médio", tipo: "escolha", opc: ["Imitar a floresta", "Loja de plantas", "Desmatar"], corr: "Imitar a floresta" },
        { p: "O que é um alimento transgênico?", n: "Difícil", tipo: "escolha", opc: ["DNA modificado", "Cresce rápido", "Vem de fora"], corr: "DNA modificado" },
        { p: "Qual a importância da conservação do solo?", n: "Médio", tipo: "escolha", opc: ["Evitar erosão", "Fazer estradas", "Pedras no terreno"], corr: "Evitar erosão" }
    ]
};

function rodar() {
    document.getElementById('roleta').classList.add('girar');
    setTimeout(() => {
        document.getElementById('tela').innerHTML = `<h3>Selecione sua faixa etária:</h3>` + 
            Object.keys(banco).map(f => `<button class="btn" onclick="escolher('${f}')">${f}</button>`).join('');
    }, 2000);
}

function escolher(faixa) {
    const q = banco[faixa][Math.floor(Math.random() * banco[faixa].length)];
    let html = `<p>${q.p}</p><div class="nivel-tag">Nível: ${q.n}</div>`;
    
    if (q.tipo === "escolha") {
        html += q.opc.map(o => `<button class="btn btn-opc" onclick="alert('${o === q.corr ? '✅ Correto!' : '❌ Errado!'}')">${o}</button>`).join('');
    }
    html += `<button class="btn" style="background:#b71c1c" onclick="location.reload()">Girar Novamente</button>`;
    document.getElementById('tela').innerHTML = html;
}
</script>
</body>
</html>
