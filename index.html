<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>EcoQuiz Agro</title>
    <style>
        /* Fundo fixo sem depender de pastas */
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfacb?q=80&w=2560') no-repeat center center fixed;
            background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; }
        
        /* Roleta Simplificada */
        #wheel { 
            width: 250px; height: 250px; border-radius: 50%; border: 10px solid #5d4037;
            background: conic-gradient(#ff0000 0deg 120deg, #4caf50 120deg 240deg, #ff9800 240deg 360deg);
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 4s ease-out;
        }
        .spin { transform: rotate(1440deg); }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="wheel" onclick="girar()">
        <div style="background:white; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:#5d4037;">GIRAR</div>
    </div>
    <div id="tela">
        <p>Clique na roleta para começar!</p>
    </div>
</div>

<script>
function girar() {
    document.getElementById('wheel').classList.add('spin');
    setTimeout(() => {
        document.getElementById('tela').innerHTML = `
            <h3>Escolha seu nível:</h3>
            <button class="btn" style="background:#2e7d32" onclick="pergunta('Fácil 🌱')">Fácil 🌱</button>
            <button class="btn" style="background:#c62828" onclick="pergunta('Difícil 🚜')">Difícil 🚜</button>
        `;
    }, 3000);
}

function pergunta(nivel) {
    document.getElementById('tela').innerHTML = `
        <h3>Nível: ${nivel}</h3>
        <p>Pergunta do desafio agro aqui...</p>
        <button class="btn" style="background:#555" onclick="location.reload()">Girar Novamente</button>
    `;
}
</script>
</body>
</html>
